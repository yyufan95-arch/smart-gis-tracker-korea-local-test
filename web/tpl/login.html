<!DOCTYPE html>
<html lang="ko" dir="ltr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>포인트 지갑 로그인</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link href="/static/css/reset.css" rel="stylesheet">
  <style>
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
      margin: 0;
      padding: 0;
    }

    .login-container {
      max-width: 400px;
      margin: 100px auto;
      background: white;
      padding: 40px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
      border-radius: 10px;
      text-align: center;
    }

    .login-container h2 {
      margin-bottom: 10px;
      color: #333;
    }

    .login-container p {
      margin-bottom: 30px;
      font-size: 14px;
      color: #666;
    }

    .input-group {
      margin-bottom: 20px;
      text-align: left;
    }

    .input-group input {
      width: 100%;
      padding: 10px 15px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 14px;
    }

    .btn-submit {
      width: 100%;
      padding: 12px;
      background-color: #3288e6;
      color: white;
      font-size: 16px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn-submit:hover {
      background-color: #276fcb;
    }

    #popout {
      width: 100%;
      height: 100%;
      font-family: 'Noto Sans KR', sans-serif;
      background-color: rgba(0, 0, 0, .5);
      position: fixed;
      z-index: 10;
      display: block;
      top: 0;
      left: 0;
    }

    .popout {
      width: 400px;
      background: #fff;
      padding: 30px;
      border-radius: 10px;
      position: absolute;
      top: 30%;
      left: 50%;
      transform: translate(-50%, -30%);
      text-align: center;
    }

    .popout div {
      margin-bottom: 20px;
      font-size: 16px;
      color: #333;
    }

    .popout button {
      padding: 10px 20px;
      background-color: #3288e6;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>

{{if .Flag}}
<div id="popout">
  <div class="popout">
    <div>아이디 또는 비밀번호가 잘못되었습니다. 다시 시도해 주세요.</div>
    <button type="button">확인</button>
  </div>
</div>
{{end}}

<div class="login-container">
  <h2>포인트 지갑 로그인</h2>
  <p>계정을 입력하여 로그인해 주세요</p>
  <form id="loginForm" action="/login" method="post" autocomplete="off">
    <div class="input-group">
      <input type="text" name="loginName" id="username" placeholder="전화번호 / DID / 이메일" required>
    </div>
    <div class="input-group">
      <input type="password" name="password" id="password" placeholder="비밀번호" required>
    </div>
    <button type="submit" class="btn-submit">로그인</button>
  </form>
</div>

<script src="/static/js/jquery.min.js"></script>
<script>
  $(document).ready(function () {
    $('.popout button').on('click', function () {
      $('#popout').hide();
    });
  });
</script>
</body>
</html>
