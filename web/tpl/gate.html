<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
  <title>현장 티켓 확인</title>
  <style>
    body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial;color:#0b1b2b;background:#0f172a;margin:0;padding:16px}
    .wrap{max-width:640px;margin:0 auto}
    .card{background:#111827;border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,.35);padding:16px}
    h1{color:#93c5fd;margin:0 0 12px}
    .row{display:grid;grid-template-columns:100px 1fr;gap:8px;margin:6px 0;color:#e5e7eb}
    .status{display:inline-block;padding:4px 10px;border-radius:999px;font-weight:700}
    .ok{background:rgba(34,197,94,.18);color:#bbf7d0}
    .warn{background:rgba(234,179,8,.18);color:#fde68a}
    .bad{background:rgba(239,68,68,.18);color:#fecaca}
    .actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
    button{appearance:none;border:0;border-radius:10px;padding:12px 16px;background:#2563eb;color:#fff;font-weight:700;cursor:pointer}
    button.secondary{background:#334155}
    input{width:100%;padding:10px;border-radius:8px;border:1px solid #334155;background:#0b1220;color:#e5e7eb}
    small{color:#9ca3af}
    .muted{color:#9ca3af}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}

    #scanBox{display:none;margin-top:8px;max-width:420px;position:relative}
    #cam{width:100%;border-radius:8px;background:#000;box-shadow:0 6px 20px rgba(0,0,0,.35)}
    /* 叠加层：绘制检测框/对齐角 */
    #overlay{position:absolute;inset:0;border-radius:8px;pointer-events:none}
    /* 中央取景器四角线（无锁定时） */
    .finder-corners::before, .finder-corners::after{
      content:""; position:absolute; inset:10% 10%; border:3px solid rgba(147,197,253,.9);
      border-radius:14px; box-shadow:0 0 0 9999px rgba(0,0,0,.35); /* 暗角 */
    }
    .finder-corners.locked::before, .finder-corners.locked::after{ border-color:rgba(34,197,94,.95) }

    /* 手动控制条 */
    .controls{display:flex;gap:8px;align-items:center;margin-top:8px;flex-wrap:wrap}
    .controls input[type=range]{width:160px}
    .hint-bad{color:#fecaca}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>현장 티켓 확인</h1>

    <div class="card" id="panel-input">
      <div class="row">
        <div>티켓 ID</div>
        <div><input id="ticketId" placeholder="예: evt_A_A_000001" autocomplete="off"/></div>
      </div>

      <div class="actions">
        <button onclick="loadTicket()">조회</button>
        <button id="btnScan" type="button" class="secondary">QR 스캔</button>
        <button id="btnTorch" type="button" class="secondary" style="display:none;">조명 켜기</button>
        <button id="btnStop" type="button" class="secondary" style="display:none;">카메라 중지</button>
        <span id="scanHint" class="muted" style="align-self:center;"></span>
      </div>

      <!-- 额外可选控制 -->
      <div class="controls" id="scanCtrls" style="display:none">
        <label class="muted">줌</label>
        <input id="zoomRange" type="range" min="1" max="5" step="0.1" value="1" />
        <small id="zoomVal" class="muted">1.0×</small>
        <label class="muted">강화</label>
        <input id="enhanceChk" type="checkbox" />
        <small class="muted">저조도/원거리 보정</small>
      </div>

      <!-- 카메라 프리뷰 -->
      <div id="scanBox">
        <video id="cam" playsinline muted></video>
        <canvas id="overlay"></canvas>
        <div id="finder" class="finder-corners"></div>
      </div>

      <small class="muted">직접 입력하거나 QR을 스캔하세요. 후면 카메라/자동초점/보조광/줌을 활용합니다. 저조도에서는 조명을 켜거나 가까이 접근하세요.</small>
    </div>

    <div style="height:12px"></div>

    <div class="card" id="panel-result" style="display:none">
      <div class="row"><div>이벤트</div><div id="f-event" class="mono"></div></div>
      <div class="row"><div>티켓</div><div id="f-id" class="mono"></div></div>
      <div class="row"><div>좌석</div><div id="f-seat"></div></div>
      <div class="row"><div>상태</div><div id="f-status"></div></div>
      <div class="actions" id="act-area"></div>
      <div id="msg" class="muted" style="margin-top:8px"></div>
    </div>
  </div>

<script>
const $ = s => document.querySelector(s);
const state = { ticket: null };

async function loadTicket() {
  const id = ($('#ticketId').value || '').trim();
  if (!id) return alert('ticketId를 입력하세요.');
  try {
    $('#msg').textContent = '';
    const r = await fetch(`/api/ticket?id=${encodeURIComponent(id)}`);
    if (!r.ok) throw new Error('해당 티켓을 찾을 수 없습니다.');
    const tk = await r.json();
    state.ticket = tk;

    $('#f-event').textContent = tk.eventId || '';
    $('#f-id').textContent = tk.ticketId || '';
    const zone = tk.meta && tk.meta.zone ? tk.meta.zone : '구역 미지정';
    const seat = tk.meta && tk.meta.seat ? ` · 좌석 ${tk.meta.seat}` : '';
    $('#f-seat').textContent = zone + seat;

    const st = (tk.status || '').toLowerCase();
    const badge = document.createElement('span');
    badge.className = 'status ' + (st === 'issued' ? 'ok' : (st === 'used' ? 'bad' : 'warn'));
    badge.textContent = st === 'issued' ? '사용 가능'
                    : st === 'used'   ? '이미 사용됨'
                    : st === 'unassigned' ? '배정 안 됨'
                    : tk.status;
    $('#f-status').innerHTML = '';
    $('#f-status').appendChild(badge);

    const act = $('#act-area');
    act.innerHTML = '';
    if (st === 'issued') {
      const btn = document.createElement('button');
      btn.textContent = '입장 확인';
      btn.onclick = useTicket;
      act.appendChild(btn);
    } else {
      const btn = document.createElement('button');
      btn.textContent = '새로고침';
      btn.className = 'secondary';
      btn.onclick = loadTicket;
      act.appendChild(btn);
    }

    $('#panel-result').style.display = '';
  } catch (e) {
    alert(e.message || e);
  }
}

async function useTicket() {
  if (!state.ticket) return;
  if (!confirm('이 티켓을 사용 처리하시겠습니까?')) return;
  try {
    const r = await fetch('/api/gate/ticket/use', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ ticketId: state.ticket.ticketId })
    });
    const t = await r.json().catch(()=>({}));
    if (!r.ok || !t.ok) {
      const msg = (t && t.msg) || '처리에 실패했습니다.';
      if (msg === 'ALREADY_USED') return alert('이 티켓은 이미 사용되었습니다.');
      if (msg === 'NOT_ISSUED')  return alert('현재 상태에서는 사용 불가합니다.');
      throw new Error(msg);
    }
    $('#msg').textContent = `사용 처리 완료, TxID: ${t.txId || ''}`;
    loadTicket();
  } catch (e) {
    alert(e.message || e);
  }
}

/* ------------------------
   QR 스캔 (灵敏度/易用性增强)
   ------------------------ */
const vid = $('#cam');
const overlay = $('#overlay');
const finder = $('#finder');
const scanBox = $('#scanBox');
const btnScan = $('#btnScan');
const btnStop = $('#btnStop');
const btnTorch = $('#btnTorch');
const scanHint = $('#scanHint');
const scanCtrls = $('#scanCtrls');
const zoomRange = $('#zoomRange');
const zoomVal = $('#zoomVal');
const enhanceChk = $('#enhanceChk');

let stream = null, videoTrack = null, imageCapture = null;
let rafId = null, rVFC = null; // requestVideoFrameCallback
let detector = null;
let usingJsQR = false;
let jsQRLoaded = false;
let workCanvas = null, workCtx = null; // 解码画布
let overlayCtx = null;
let torchOn = false;
let baseZoom = 1;
let lastManualZoom = null;

let noHitFrames = 0;
let autoZoomTimer = 0;
let zoomCaps = null;

function extractTicketId(text){
  if(!text) return '';
  const m1 = text.match(/[?&](?:id|ticketId)=([^&\s]+)/i);
  if (m1) return decodeURIComponent(m1[1]);
  const m2 = text.match(/TicketID:\s*([^\s\r\n]+)/i);
  if (m2) return m2[1];
  try{ const o = JSON.parse(text); if (o.ticketId) return String(o.ticketId); }catch(e){}
  if (/^[^\s]+$/.test(text.trim())) return text.trim();
  return '';
}

function loadJsQR(){
  return new Promise((resolve, reject)=>{
    if (jsQRLoaded) return resolve();
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js';
    s.onload = ()=>{ jsQRLoaded = true; resolve(); };
    s.onerror = ()=>reject(new Error('jsQR 로드 실패'));
    document.head.appendChild(s);
  });
}

async function startScan(){
  try{
    const constraints = {
      audio: false,
      video: {
        facingMode: { ideal: 'environment' },
        width: { ideal: 1920 }, height: { ideal: 1080 }, // 更高初始分辨率
        frameRate: { ideal: 30 },
        advanced: [
          { focusMode: 'continuous' },
          { exposureMode: 'continuous' },
          { whiteBalanceMode: 'continuous' },
          { noiseSuppression: true },
          { imageStabilization: true }
        ]
      }
    };
    stream = await navigator.mediaDevices.getUserMedia(constraints);
    vid.srcObject = stream;
    await vid.play();

    overlay.width = vid.clientWidth;
    overlay.height = vid.clientHeight;
    overlayCtx = overlay.getContext('2d');

    videoTrack = stream.getVideoTracks()[0];
    imageCapture = (window.ImageCapture ? new ImageCapture(videoTrack) : null);

    await tryApplyCameraEnhance(videoTrack);

    // Detector优先，兼容到jsQR
    if (window.BarcodeDetector) {
      const fmts = await (BarcodeDetector.getSupportedFormats ? BarcodeDetector.getSupportedFormats() : Promise.resolve([]));
      if (!fmts.length || fmts.includes('qr_code')) {
        detector = new BarcodeDetector({ formats: ['qr_code'] });
      }
    }
    if (!detector) {
      await loadJsQR();
      usingJsQR = true;
      if (!workCanvas) { workCanvas = document.createElement('canvas'); workCtx = workCanvas.getContext('2d'); }
    }

    // UI 切换
    scanBox.style.display = 'block';
    btnStop.style.display = 'inline-block';
    btnScan.disabled = true;
    scanCtrls.style.display = 'flex';
    scanHint.textContent = usingJsQR ? '스캔 중 (대체 라이브러리)…' : '스캔 중 (내장)…';

    // 允许点击聚焦（部分机型支持 single-shot）
    vid.addEventListener('click', tapToFocus, { once:false });

    // 帧循环：优先使用 requestVideoFrameCallback（更稳更省）
    if ('requestVideoFrameCallback' in HTMLVideoElement.prototype) {
      const loop = async (now, meta) => {
        await scanFrame();
        rVFC = vid.requestVideoFrameCallback(loop);
      };
      rVFC = vid.requestVideoFrameCallback(loop);
    } else {
      loopScanRAF();
    }
  }catch(e){
    console.error(e);
    scanHint.textContent = '카메라 접근 불가: ' + (e.message || e);
  }
}

async function tryApplyCameraEnhance(track){
  const caps = track.getCapabilities?.() || {};
  zoomCaps = caps.zoom || null;

  // 连续对焦
  if (caps.focusMode && caps.focusMode.includes('continuous')) {
    try { await track.applyConstraints({ advanced: [{ focusMode: 'continuous' }] }); } catch {}
  }

  // 初始变焦：2x 更易扫远码
  if (zoomCaps) {
    const min = zoomCaps.min ?? 1, max = zoomCaps.max ?? 5;
    const ideal = Math.min(max, Math.max(min, 2));
    baseZoom = ideal;
    try { await track.applyConstraints({ advanced: [{ zoom: ideal }] }); } catch {}
    applyZoomUI(ideal, min, max);
    enablePinchZoom(track, zoomCaps);
  } else {
    applyZoomUI(1, 1, 5); // UI 仍可显示占位
  }

  // 手电
  if (caps.torch) {
    btnTorch.style.display = 'inline-block';
    btnTorch.onclick = async ()=>{
      torchOn = !torchOn;
      try { await track.applyConstraints({ advanced: [{ torch: torchOn }] }); } catch (e) { torchOn = !torchOn; }
      btnTorch.textContent = torchOn ? '조명 끄기' : '조명 켜기';
    };
  } else {
    btnTorch.style.display = 'none';
  }

  // 低光提示
  setTimeout(async ()=>{
    try{
      const s = track.getSettings?.();
      if (s && s.brightness !== undefined && s.brightness < 0.5) {
        scanHint.innerHTML = '<span class="hint-bad">조명이 어두워 인식이 느릴 수 있어요. 필요 시 조명을 켜세요.</span>';
      }
    }catch{}
  }, 800);
}

function applyZoomUI(val, min, max){
  zoomRange.min = String(min ?? 1);
  zoomRange.max = String(max ?? 5);
  zoomRange.value = String(val ?? 1);
  zoomVal.textContent = `${Number(zoomRange.value).toFixed(1)}×`;
  zoomRange.oninput = async (e)=>{
    const v = Number(e.target.value);
    zoomVal.textContent = `${v.toFixed(1)}×`;
    lastManualZoom = v;
    if (videoTrack && zoomCaps) {
      try { await videoTrack.applyConstraints({ advanced: [{ zoom: v }] }); } catch {}
    }
  };
}

function enablePinchZoom(track, caps){
  let startDist = 0, base = Number(zoomRange.value||1);
  const el = vid;
  el.addEventListener('touchstart',(e)=>{
    if (e.touches.length===2) {
      startDist = getDist(e.touches[0], e.touches[1]);
      base = Number(zoomRange.value||1);
    }
  }, {passive:true});
  el.addEventListener('touchmove', async (e)=>{
    if (e.touches.length===2 && caps) {
      const dist = getDist(e.touches[0], e.touches[1]);
      const scale = dist / (startDist || dist);
      const min = caps.min ?? 1, max = caps.max ?? 5;
      const target = Math.min(max, Math.max(min, base * scale));
      if (Math.abs(target - Number(zoomRange.value)) > 0.05) {
        zoomRange.value = String(target);
        zoomVal.textContent = `${target.toFixed(1)}×`;
        lastManualZoom = target;
        try { await track.applyConstraints({ advanced: [{ zoom: target }] }); } catch {}
      }
    }
  }, {passive:true});
}
function getDist(a,b){ const dx=a.clientX-b.clientX, dy=a.clientY-b.clientY; return Math.hypot(dx,dy); }

// 点击对焦（部分设备支持 single-shot）
async function tapToFocus(){
  if (!videoTrack?.getCapabilities) return;
  const caps = videoTrack.getCapabilities();
  if (caps.focusMode && caps.focusMode.includes('single-shot')) {
    try {
      await videoTrack.applyConstraints({ advanced: [{ focusMode: 'single-shot' }] });
      setTimeout(async()=>{ // 还原为连续
        try { await videoTrack.applyConstraints({ advanced: [{ focusMode: 'continuous' }] }); } catch{}
      }, 1000);
    } catch {}
  }
}

function stopScan(){
  if (rVFC) { vid.cancelVideoFrameCallback(rVFC); rVFC = null; }
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  if (stream) { stream.getTracks().forEach(t=>t.stop()); stream = null; }
  detector = null;
  usingJsQR = false;
  btnScan.disabled = false;
  btnStop.style.display = 'none';
  btnTorch.style.display = 'none';
  scanCtrls.style.display = 'none';
  scanBox.style.display = 'none';
  scanHint.textContent = '';
  finder.classList.remove('locked');
  overlayCtx?.clearRect(0,0,overlay.width,overlay.height);
  torchOn = false;
  imageCapture = null;
  noHitFrames = 0;
  autoZoomTimer = 0;
}

function loopScanRAF(){
  const loop = async ()=>{
    await scanFrame();
    rafId = requestAnimationFrame(loop);
  };
  rafId = requestAnimationFrame(loop);
}

// 将视频尺寸映射到 overlay 画布坐标
function videoToOverlayRect(bbox){
  const vw = vid.videoWidth, vh = vid.videoHeight;
  const cw = overlay.width, ch = overlay.height;
  if (!vw || !vh || !cw || !ch) return null;
  const videoRatio = vw / vh;
  const canvasRatio = cw / ch;
  let drawW, drawH, ox, oy;
  if (videoRatio > canvasRatio) {
    drawW = cw; drawH = cw / videoRatio;
    ox = 0; oy = (ch - drawH)/2;
  } else {
    drawH = ch; drawW = ch * videoRatio;
    oy = 0; ox = (cw - drawW)/2;
  }
  const sx = ox + bbox.x * (drawW / vw);
  const sy = oy + bbox.y * (drawH / vh);
  const sw = bbox.width * (drawW / vw);
  const sh = bbox.height * (drawH / vh);
  return { x:sx, y:sy, w:sw, h:sh };
}

async function scanFrame(){
  if (!vid || vid.readyState < 2) return;

  // 清空覆盖层
  overlayCtx.clearRect(0,0,overlay.width,overlay.height);

  // 先试内置 Detector
  try{
    if (detector) {
      const res = await detector.detect(vid);
      if (res && res.length) {
        drawAndLock(res[0]);
        return onDecoded(String(res[0].rawValue || ''));
      }
    }
  }catch(e){ /* 某些安卓机型 detector.detect 偶发异常，忽略后用 jsQR */ }

  // 回退 jsQR：先 ROI，再全图，多尺度
  if (usingJsQR && window.jsQR) {
    const w = vid.videoWidth, h = vid.videoHeight;
    if (!w || !h) return;

    if (!workCanvas) { workCanvas = document.createElement('canvas'); workCtx = workCanvas.getContext('2d'); }

    // 目标解码过程：ROI(中央正方形) -> 全图(720p 缩放) -> 全图(1080p 限流)
    const passes = [];

    // 1) 中央 ROI：边长取 min(w,h)*0.72，远距更稳
    const roiSize = Math.floor(Math.min(w, h) * 0.72);
    const roiX = Math.floor((w - roiSize) / 2);
    const roiY = Math.floor((h - roiSize) / 2);
    passes.push({ sx: roiX, sy: roiY, sw: roiSize, sh: roiSize, tag: 'ROI' });

    // 2) 缩到最长边 720 的全图
    passes.push({ sx: 0, sy: 0, sw: w, sh: h, maxSide: 720, tag: 'FULL-720' });

    // 3) 如仍无果，每隔 ~6 帧再试一次高分全图（开销大）
    if ((noHitFrames % 6) === 0) passes.push({ sx: 0, sy: 0, sw: w, sh: h, maxSide: 1080, tag: 'FULL-1080' });

    for (const p of passes) {
      const scale = p.maxSide ? Math.min(1, (p.maxSide / Math.max(p.sw, p.sh))) : 1;
      workCanvas.width = Math.max(240, Math.floor(p.sw * scale));
      workCanvas.height = Math.max(240, Math.floor(p.sh * scale));

      // 可选图像增强（低光&远距）：对比度/亮度微调（只影响 jsQR）
      if (enhanceChk.checked) {
        workCtx.filter = 'contrast(1.2) brightness(1.08)';
      } else {
        workCtx.filter = 'none';
      }
      workCtx.drawImage(vid, p.sx, p.sy, p.sw, p.sh, 0, 0, workCanvas.width, workCanvas.height);
      const img = workCtx.getImageData(0, 0, workCanvas.width, workCanvas.height);
      const code = jsQR(img.data, img.width, img.height, { inversionAttempts: 'attemptBoth' });
      if (code && code.data) {
        // 绘制检测框（转换回 overlay 坐标）
        const quad = code.location && code.location.topLeft && code.location.topRight ? code.location : null;
        if (quad) drawQuadFromJSQR(quad, p);
        return onDecoded(String(code.data||''));
      }
    }
  }

  // 自适应变焦（无识别时小步扫描）
  noHitFrames++;
  autoZoomScan();
}

function drawAndLock(found){
  // 内置 Detector：有 boundingBox / cornerPoints
  finder.classList.add('locked');

  try{
    const bb = found.boundingBox || null;
    overlayCtx.lineWidth = 4;
    overlayCtx.strokeStyle = 'rgba(34,197,94,.95)';
    overlayCtx.shadowColor = 'rgba(0,0,0,.4)';
    overlayCtx.shadowBlur = 6;

    if (bb) {
      const rect = videoToOverlayRect({ x:bb.x, y:bb.y, width:bb.width, height:bb.height });
      if (rect) {
        overlayCtx.strokeRect(rect.x, rect.y, rect.w, rect.h);
      }
    } else if (found.cornerPoints) {
      overlayCtx.beginPath();
      found.cornerPoints.forEach((p,i)=>{
        const mapped = videoToOverlayRect({ x:p.x, y:p.y, width:0, height:0 });
        if (!mapped) return;
        if (i===0) overlayCtx.moveTo(mapped.x, mapped.y);
        else overlayCtx.lineTo(mapped.x, mapped.y);
      });
      overlayCtx.closePath();
      overlayCtx.stroke();
    }
  }catch{}
}

function drawQuadFromJSQR(loc, pass){
  finder.classList.add('locked');

  // 将 jsQR ROI 坐标映射回 video，再到 overlay
  const w = vid.videoWidth, h = vid.videoHeight;
  const sw = pass.sw, sh = pass.sh, sx = pass.sx, sy = pass.sy;
  const scale = pass.maxSide ? Math.min(1, (pass.maxSide / Math.max(sw, sh))) : 1;

  const mapPt = (pt)=>{
    const xVideo = sx + pt.x / scale;
    const yVideo = sy + pt.y / scale;
    const mapped = videoToOverlayRect({ x:xVideo, y:yVideo, width:0, height:0 });
    return mapped ? { x:mapped.x, y:mapped.y } : null;
  };

  const tl = mapPt(loc.topLeft), tr = mapPt(loc.topRight), br = mapPt(loc.bottomRight), bl = mapPt(loc.bottomLeft);
  if (!(tl && tr && br && bl)) return;

  overlayCtx.lineWidth = 4;
  overlayCtx.strokeStyle = 'rgba(34,197,94,.95)';
  overlayCtx.shadowColor = 'rgba(0,0,0,.4)';
  overlayCtx.shadowBlur = 6;

  overlayCtx.beginPath();
  overlayCtx.moveTo(tl.x, tl.y);
  overlayCtx.lineTo(tr.x, tr.y);
  overlayCtx.lineTo(br.x, br.y);
  overlayCtx.lineTo(bl.x, bl.y);
  overlayCtx.closePath();
  overlayCtx.stroke();
}

function autoZoomScan(){
  if (!videoTrack || !zoomCaps) return;
  // 手动调过就不自动干预一段时间
  if (lastManualZoom && (performance.now() - autoZoomTimer < 4000)) return;

  if (noHitFrames % 15 === 0) {
    const curr = Number(zoomRange.value || baseZoom || 1);
    const min = zoomCaps.min ?? 1, max = zoomCaps.max ?? 5;

    // 在 [base-0.4, base+1.0] 范围内轻微扫动
    let targets = [
      Math.min(max, curr + 0.4),
      Math.max(min, curr - 0.3)
    ];
    const next = targets[(noHitFrames/15)%2|0];

    zoomRange.value = String(next);
    zoomVal.textContent = `${next.toFixed(1)}×`;
    videoTrack.applyConstraints({ advanced: [{ zoom: next }] }).catch(()=>{});
    autoZoomTimer = performance.now();
  }
}

function onDecoded(text){
  if (navigator.vibrate) navigator.vibrate(50);
  scanHint.textContent = '인식 완료';
  const id = extractTicketId(text);
  if (!id) {
    stopScan();
    return alert('QR을 인식했으나 ticketId를 찾을 수 없습니다.\n원문:\n' + text);
  }
  const input = $('#ticketId');
  if (input) {
    input.value = id;
    input.dispatchEvent(new Event('input', { bubbles: true }));
  }
  stopScan();
  loadTicket();
}

// 事件绑定
btnScan?.addEventListener('click', startScan);
btnStop?.addEventListener('click', stopScan);
document.addEventListener('visibilitychange', ()=>{ if (document.hidden) stopScan(); });
window.addEventListener('beforeunload', stopScan);
</script>
