<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Smart Tour GIS 인도네시아 관광객 추적 시스템</title>
    <!-- 1. Leaflet 라이브러리 로드 -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        /* 2. 기초 레이아웃 초기화 */
        * {
            margin: 0 !important;
            padding: 0 !important;
            box-sizing: border-box !important;
        }
        html, body {
            height: 100vh !important;
            width: 100vw !important;
            overflow: hidden !important;
            font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
            background: #f0f0f0 !important;
        }

        /* 3. 왼쪽 패널 */
        #sidebar {
            position: absolute !important;
            top: 0 !important;
            left: 0 !important;
            width: 320px !important;
            height: 100vh !important;
            background: #ffffff !important;
            border-right: 2px solid #e0e0e0 !important;
            z-index: 1000 !important;
            padding: 20px !important;
            display: flex !important;
            flex-direction: column !important;
            gap: 12px !important;
        }

        /* 4. 오른쪽 지도 */
        #map {
            position: absolute !important;
            top: 0 !important;
            left: 320px !important;
            right: 0 !important;
            bottom: 0 !important;
            background: #e5e3df !important;
            z-index: 1 !important;
        }

        h1 { color: #1a73e8 !important; font-size: 24px !important; margin-bottom: 4px !important; }
        .info-text { font-size: 13px !important; color: #666 !important; line-height: 1.6 !important; margin-bottom: 10px !important; }
        
        .task-item {
            padding: 14px !important;
            border: 1px solid #e0e0e0 !important;
            border-radius: 6px !important;
            background: #fff !important;
            font-size: 14px !important;
        }
        .task-item.active {
            border-left: 5px solid #34a853 !important;
            background: #f0fff4 !important;
            color: #2e7d32 !important;
            font-weight: bold !important;
        }
        .task-item.waiting {
            border-left: 5px solid #fbbc05 !important;
            background: #fff9e6 !important;
            color: #e65100 !important;
        }

        .btn {
            width: 100% !important;
            padding: 14px !important;
            background: #1a73e8 !important;
            color: white !important;
            border: none !important;
            border-radius: 6px !important;
            font-size: 16px !important;
            cursor: pointer !important;
            font-weight: bold !important;
        }
        .btn:disabled { background: #ccc !important; cursor: not-allowed !important; }

        .log-box {
            flex: 1 !important;
            background: #1e1e1e !important;
            color: #34a853 !important;
            padding: 12px !important;
            border-radius: 6px !important;
            overflow-y: auto !important;
            font-family: 'Consolas', monospace !important;
            font-size: 12px !important;
            margin-top: 10px !important;
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <h1>Smart Tour GIS</h1>
        <div class="info-text">
            <b>미션 대상:</b> 인도네시아 단체 (20명)<br>
            <b>좌표 시스템:</b> WGS84 (자카르타)<br>
            <b>상태:</b> <span id="gpsStatus">GPS 권한을 허용해 주세요</span>
        </div>

        <div class="task-item waiting" id="step-A">Step A. 신원 인증 및 체크인</div>
        <div class="task-item waiting" id="step-B">Step B. 문화 체험 참여</div>
        <div class="task-item waiting" id="step-C">Step C. 비용 결제 완료</div>
        <div class="task-item waiting" id="step-D">Step D. 전체 미션 달성</div>

        <button class="btn" id="authBtn" disabled>GPS 권한 대기 중...</button>

        <p style="margin-top: 10px; font-size: 12px; font-weight: bold; color: #444;">실시간 DB 시뮬레이션 (JSON):</p>
        <div class="log-box" id="logBox">인증 기록 대기 중...</div>
    </div>

    <div id="map"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 지도 초기화
            const map = L.map('map', { zoomControl: false }).setView([-6.2088, 106.8456], 13);

            // 타일 레이어 (CartoDB)
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap'
            }).addTo(map);

            L.control.zoom({ position: 'topright' }).addTo(map);

            // A/B/C/D 인증 지점 (고정 좌표)
            const points = [
                { id: 'A', name: "A-신원 인증 지점", lat: -6.2088, lng: 106.8456, radius: 200 }, // 200m 반경 내 인증
                { id: 'B', name: "B-문화 체험 지점", lat: -6.2100, lng: 106.8500, radius: 200 },
                { id: 'C', name: "C-비용 결제 지점", lat: -6.2050, lng: 106.8400, radius: 200 },
                { id: 'D', name: "D-최종 도착 지점", lat: -6.2120, lng: 106.8350, radius: 200 }
            ];

            const markers = {};
            const latlngs = points.map(p => [p.lat, p.lng]);
            const completedSteps = new Set();
            let currentStepIdx = 0;
            let userMarker = null;

            // 지점 마커 & 트랙라인
            points.forEach(p => {
                markers[p.id] = L.marker([p.lat, p.lng]).addTo(map);
                markers[p.id].bindPopup(`<b>${p.name}</b>`);
            });
            L.polyline(latlngs, { color: '#d93025', weight: 4, opacity: 0.7, dashArray: '5, 10' }).addTo(map);

            const authBtn = document.getElementById('authBtn');
            const logBox = document.getElementById('logBox');
            const gpsStatus = document.getElementById('gpsStatus');

            // 거리 계산 함수 (Haversine 공식)
            function getDistance(lat1, lon1, lat2, lon2) {
                const R = 6371000;
                const dLat = (lat2 - lat1) * Math.PI / 180;
                const dLon = (lon2 - lon1) * Math.PI / 180;
                const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
                const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                return R * c;
            }

            // 로그 업데이트
            function updateLog() {
                const records = JSON.parse(localStorage.getItem('tourRecords') || '[]');
                if (records.length === 0) {
                    logBox.innerHTML = "인증 기록 대기 중...";
                    return;
                }
                logBox.innerHTML = records.map(r => 
                    `<div><span style="color: #aaa;">[${r.time.split(' ')[1]}]</span> <b style="color: #fff;">${r.step}</b>: ${r.status}</div>`
                ).join('');
                logBox.scrollTop = logBox.scrollHeight;
            }

            // GPS 위치 추적 시작
            if (navigator.geolocation) {
                authBtn.textContent = "GPS 권한 허용 중...";
                navigator.geolocation.watchPosition(
                    // 위치 성공
                    function(pos) {
                        const lat = pos.coords.latitude;
                        const lng = pos.coords.longitude;
                        gpsStatus.textContent = `연결됨 (${lat.toFixed(4)}, ${lng.toFixed(4)})`;
                        authBtn.disabled = false;

                        // 사용자 위치 마커 업데이트
                        if (!userMarker) {
                            userMarker = L.marker([lat, lng], {
                                icon: L.divIcon({
                                    className: 'user-marker',
                                    html: '<div style="background:#1a73e8;width:16px;height:16px;border-radius:50%;border:3px solid white;box-shadow:0 0 5px rgba(0,0,0,0.3);"></div>',
                                    iconSize: [16,16],
                                    iconAnchor: [8,8]
                                })
                            }).addTo(map);
                        } else {
                            userMarker.setLatLng([lat, lng]);
                        }
                        map.setView([lat, lng], 15);

                        // 현재 단계 인증 체크
                        if (currentStepIdx < points.length) {
                            const p = points[currentStepIdx];
                            const distance = getDistance(lat, lng, p.lat, p.lng);

                            if (distance <= p.radius && !completedSteps.has(p.id)) {
                                // 인증 성공
                                completedSteps.add(p.id);
                                const now = new Date();
                                const record = {
                                    time: now.toLocaleString(),
                                    step: p.id,
                                    status: "인증 통과됨 (자동)",
                                    coords: `${lat.toFixed(4)}, ${lng.toFixed(4)}`
                                };

                                const records = JSON.parse(localStorage.getItem('tourRecords') || '[]');
                                records.push(record);
                                localStorage.setItem('tourRecords', JSON.stringify(records));

                                document.getElementById(`step-${p.id}`).classList.remove('waiting');
                                document.getElementById(`step-${p.id}`).classList.add('active');
                                markers[p.id].openPopup();

                                currentStepIdx++;
                                if (currentStepIdx < points.length) {
                                    authBtn.textContent = `다음 단계로 이동해 주세요 (${points[currentStepIdx].id})`;
                                } else {
                                    authBtn.textContent = "모든 미션 완료 ✓";
                                    authBtn.disabled = true;
                                }
                                updateLog();
                            } else if (!completedSteps.has(p.id)) {
                                authBtn.textContent = `현재 단계: ${p.id} (${Math.round(distance)}m 남음)`;
                            }
                        }
                    },
                    // 위치 오류
                    function(err) {
                        gpsStatus.textContent = `오류: ${err.message}`;
                        authBtn.textContent = "GPS 권한이 필요합니다";
                        authBtn.disabled = true;
                    },
                    { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 }
                );
            } else {
                gpsStatus.textContent = "GPS를 지원하지 않는 브라우저입니다";
                authBtn.textContent = "GPS 사용 불가";
                authBtn.disabled = true;
            }

            localStorage.removeItem('tourRecords'); 
            updateLog();
            setTimeout(() => { map.invalidateSize(); }, 500);
        });
    </script>
</body>
</html>
